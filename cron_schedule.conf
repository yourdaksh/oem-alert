# Cron Schedule Configuration
# Edit this file to change scanning frequency

# Current schedule: Every hour
SCHEDULE="0 */2 * * *"

# Common schedule examples:
# Every 30 minutes: "*/30 * * * *"
# Every 2 hours: "0 */2 * * *"
# Every 6 hours: "0 */6 * * *"
# Daily at 2 AM: "0 2 * * *"
# Weekdays at 9 AM: "0 9 * * 1-5"
# Twice daily (6 AM and 6 PM): "0 6,18 * * *"

# Cron format: minute hour day month weekday
# * = any value
# */n = every n units
# n,m = specific values (comma-separated)
# n-m = range of values
