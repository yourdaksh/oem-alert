# Severity mapping for standardization
severity_mapping:
  critical: ["critical", "cve", "high", "urgent"]
  high: ["high", "important", "severe"]
  medium: ["medium", "moderate", "normal"]
  low: ["low", "minor", "informational"]

# Common vulnerability patterns
vulnerability_patterns:
  cve_pattern: "CVE-\\d{4}-\\d{4,7}"
  cvss_pattern: "CVSS:3\\.\\d/\\d+\\.\\d"
  version_pattern: "\\d+\\.\\d+(?:\\.\\d+)?(?:\\.\\d+)?"
  date_patterns:
    - "\\d{4}-\\d{2}-\\d{2}"
    - "\\d{2}/\\d{2}/\\d{4}"
    - "\\d{2}-\\d{2}-\\d{4}"